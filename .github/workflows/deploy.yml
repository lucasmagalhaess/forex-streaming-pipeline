name: CI/CD — Forex Streaming Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'

jobs:
  test_extract:
    name: Testes — Extração
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependências
        run: pip install pytest requests boto3

      - name: Roda os testes
        working-directory: pipeline/extract
        run: pytest test_extract.py -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test_extract
    steps:
      - uses: actions/checkout@v4

      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy script de extração para S3
        run: |
          aws s3 cp pipeline/extract/extract.py \
            s3://forex-streaming-datalake-dev/scripts/extract.py
          echo "✅ Script deployado com sucesso!"